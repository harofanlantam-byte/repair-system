<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><title>แจ้งซ่อม</title>
<script>
(function(){
  var token = localStorage.getItem('repair_token');
  var user = null;
  try { user = JSON.parse(localStorage.getItem('repair_user') || 'null'); } catch(e){}
  if (!token || !user) { window.location.href = 'index.html'; return; }
  if (user.role === 'user') {
    window.location.href = 'user/repair-form.html';
  } else {
    window.location.href = 'admin/repair-form.html';
  }
})();
</script>
</head>
<body></body>
</html>
