<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ - ระบบแจ้งซ่อมครุภัณฑ์</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dark Mode Toggle -->
  <div style="position:fixed;top:16px;right:20px;z-index:100;">
    <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-toggle" style="background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;">🌙</button>
  </div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🔧</div>
        <div>
          <h1>ระบบแจ้งซ่อม</h1>
          <p>Repair Management System</p>
        </div>
      </div>

      <!-- ฟอร์มเข้าสู่ระบบ -->
      <div id="login-form-box">
        <h2>เข้าสู่ระบบ</h2>
        <p>สำหรับผู้ดูแลระบบและผู้ใช้งาน</p>
        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <input type="text" id="login-username" placeholder="กรอกชื่อผู้ใช้">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <input type="password" id="login-password" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="msg-error" id="login-err"></div>
        <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
        <p style="text-align:center;margin-top:16px;">
          ยังไม่มีบัญชี? <a href="javascript:void(0)" onclick="showRegisterForm()">สมัครสมาชิก</a>
        </p>
      </div>

      <!-- ฟอร์มสมัครสมาชิก -->
      <div id="register-form-box" style="display:none;">
        <h2>สมัครสมาชิก</h2>
        <p>กรอกข้อมูลให้ครบเพื่อสร้างบัญชีผู้ใช้งาน</p>
        <div class="form-group">
          <label>ชื่อผู้ใช้ *</label>
          <input type="text" id="reg-username" placeholder="ตั้งชื่อผู้ใช้สำหรับ login">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน * (อย่างน้อย 8 ตัวอักษร)</label>
          <input type="password" id="reg-password" placeholder="กรอกรหัสผ่าน">
        </div>
        <div class="form-group">
          <label>ยืนยันรหัสผ่าน *</label>
          <input type="password" id="reg-password2" placeholder="กรอกรหัสผ่านอีกครั้ง">
        </div>
        <div class="form-group">
          <label>ชื่อ-นามสกุล *</label>
          <input type="text" id="reg-fullname" placeholder="ชื่อ-นามสกุลจริง">
        </div>
        <div class="form-group">
          <label>อีเมล (Gmail) *</label>
          <input type="email" id="reg-email" placeholder="your@gmail.com">
        </div>
        <div class="form-group">
          <label>เบอร์โทรศัพท์</label>
          <input type="tel" id="reg-phone" placeholder="081-234-5678 (ไม่บังคับ)">
        </div>
        <div class="msg-error" id="register-err"></div>
        <button class="btn-primary" onclick="doRegister()">สมัครสมาชิก</button>
        <p style="text-align:center;margin-top:16px;">
          มีบัญชีอยู่แล้ว? <a href="javascript:void(0)" onclick="showLoginForm()">เข้าสู่ระบบ</a>
        </p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>

<script src="/socket.io/socket.io.js"></script>
<script src="/socket-client.js"></script>
</body>
</html>
