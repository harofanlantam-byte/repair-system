<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำแจ้งซ่อม - ระบบแจ้งซ่อมครุภัณฑ์</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  .equip-search-item { transition: all 0.2s ease; }
  .equip-search-item:hover { border-color: var(--accent) !important; }
  .equip-search-item:active { transform: scale(0.98); }
  #rf-equip-code { font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .format-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .format-hint strong { color: var(--accent); }
</style>
</head>
<body>
<button class="menu-toggle" onclick="toggleSidebar()"><span>☰</span> เมนู</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><span class="icon">🔧</span><span>ระบบแจ้งซ่อม</span></div>
  <nav class="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">👤</div>
      <div>
        <div class="sidebar-user-name" id="sidebar-user-name">ผู้ใช้</div>
        <div class="sidebar-user-role" id="sidebar-user-role">👤 ผู้ใช้งาน</div>
      </div>
    </div>
    <button class="nav-btn" onclick="doLogout()" style="margin-top:8px;">🚪 ออกจากระบบ</button>
  </div>
</aside>

<div id="main-app">
  <nav class="topbar">
    <div class="topbar-brand"><div class="icon">🔧</div><span>ระบบแจ้งซ่อม</span></div>
    <nav class="topbar-nav" id="topbar-nav"></nav>
    <div class="topbar-user">
      <span id="topbar-uname"></span>
      <span id="topbar-role"></span>
      <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-toggle">🌙</button>
      <button class="btn-logout" onclick="doLogout()">🚪ออกจากระบบ</button>
    </div>
  </nav>
  
  <div class="content">
    <div class="section-title">📝 คำแจ้งซ่อม</div>
    <div class="section-sub">กรอกรายละเอียดครุภัณฑ์ที่ต้องการซ่อม</div>
    
    <div class="card">
      <div class="card-body form-light">
        <div id="repair-alert"></div>
        
        <div class="form-row">
          <div class="form-group">
            <label>ประเภทครุภัณฑ์</label>
            <select id="rf-type" onchange="onTypeChange()">
              <option value="">-- เลือกประเภท --</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>รหัสครุภัณฑ์</label>
            <div style="display:flex;gap:8px;">
              <input type="text" id="rf-equip-code" placeholder="7440-016-0007/01/63" style="flex:1;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:0.5px;" maxlength="22" oninput="formatEquipmentCode(this)" onkeydown="if(event.key==='Enter')lookupEquip()" autocomplete="off">
              <button class="btn btn-outline" id="btn-search-equip" onclick="lookupEquip()" type="button">🔍 ค้นหา</button>
            </div>
            <div class="format-hint">💡 รูปแบบ: <strong>XXXX-XXX-XXXX/XX/XX</strong> (4ตัว-3ตัว-4ตัว/2ตัว/2ตัว)</div>
          </div>
        </div>
        
        <div id="equip-info-box" style="display:none;background:#f7f9fc;border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid var(--border);">
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">📦 ข้อมูลครุภัณฑ์ที่พบ</div>
          <div id="equip-info-text" style="font-size:14px;font-weight:500;"></div>
        </div>
        
        <div id="parts-section" style="display:none;">
          <div class="form-group">
            <label>🔧 เลือกชิ้นส่วนที่ต้องซ่อม (เลือกได้หลายรายการ)</label>
            <div class="parts-grid" id="parts-grid"></div>
          </div>
        </div>
        
        <div class="form-group">
          <label>📝 ปัญหาที่พบ <span style="color:red">*</span></label>
          <textarea id="rf-problem" rows="4" placeholder="อธิบายปัญหาที่พบ..."></textarea>
        </div>
        
        <div class="form-row-3">
          <div class="form-group"><label>🏢 ตึก</label><input type="text" id="rf-building" placeholder="เช่น อาคาร A"></div>
          <div class="form-group"><label>📂 ฝ่าย/แผนก</label><input type="text" id="rf-dept" placeholder="เช่น ฝ่ายการเงิน"></div>
          <div class="form-group"><label>🚪 ห้อง</label><input type="text" id="rf-room" placeholder="เช่น 101"></div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>👤 ชื่อผู้แจ้ง</label>
            <input type="text" id="rf-requester" placeholder="ชื่อ-นามสกุล">
          </div>
          <div class="form-group">
            <label>⚡ ความเร่งด่วน</label>
            <select id="rf-priority">
              <option value="normal">📋 ปกติ</option>
              <option value="urgent">🚨 เร่งด่วน</option>
              <option value="low">🔵 ไม่เร่งด่วน</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>🖼️ แนบรูปภาพ (ไม่บังคับ)</label>
          <input type="file" id="rf-image" accept="image/*" style="border:none;padding:0;">
        </div>
        
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
          <button class="btn btn-outline" onclick="goBackFromRepair()" type="button" style="color:var(--danger);border-color:var(--danger);">❌ ยกเลิก</button>
          <button class="btn btn-outline" onclick="resetRepairForm()" type="button">🗑️ ล้างข้อมูล</button>
          <button class="btn btn-accent" onclick="submitRepairForm()" type="button">💾 บันทึกคำแจ้งซ่อม</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../script.js"></script>
<script>
function formatEquipmentCode(input) {
  let value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (value === '') { input.value = ''; return; }
  let formatted = ''; let pos = 0; const totalLength = value.length;
  if (totalLength > 0) { const part1 = value.substring(0, Math.min(4, totalLength)); formatted += part1; pos = part1.length; }
  if (pos >= 4 && totalLength > 4) { formatted += '-'; const part2 = value.substring(4, Math.min(7, totalLength)); formatted += part2; pos = 4 + part2.length; }
  if (pos >= 7 && totalLength > 7) { formatted += '-'; const part3 = value.substring(7, Math.min(11, totalLength)); formatted += part3; pos = 7 + part3.length; }
  if (pos >= 11 && totalLength > 11) { formatted += '/'; const part4 = value.substring(11, Math.min(13, totalLength)); formatted += part4; pos = 11 + part4.length; }
  if (pos >= 13 && totalLength > 13) { formatted += '/'; const part5 = value.substring(13, Math.min(15, totalLength)); formatted += part5; }
  if (formatted.length > 19) formatted = formatted.substring(0, 19);
  input.value = formatted;
}

async function lookupEquip() {
  const input = document.getElementById('rf-equip-code');
  let code = input.value.trim();
  if (!code) { alert('⚠️ กรุณากรอกรหัสครุภัณฑ์'); input.focus(); return; }
  const box = document.getElementById('equip-info-box');
  const searchBtn = document.getElementById('btn-search-equip');
  if (searchBtn) { searchBtn.textContent = '⏳ กำลังค้นหา...'; searchBtn.disabled = true; }
  if (box) { box.style.display = 'block'; box.innerHTML = `<div class="alert alert-info">🔍 กำลังค้นหาข้อมูล "${code}" ...</div>`; }
  try {
    let res = await api('GET', `/api/equipment?search=${encodeURIComponent(code)}`);
    if (res.success && res.data.length > 0) {
      if (res.data.length === 1) { displayEquipmentInfo(res.data[0]); alert('✅ พบครุภัณฑ์: ' + res.data[0].equipment_code); }
      else { showEquipmentList(res.data); }
      return;
    }
    res = await api('GET', `/api/equipment?search=${encodeURIComponent(code.replace(/[-/]/g,''))}`);
    if (res.success && res.data.length > 0) {
      if (res.data.length === 1) { displayEquipmentInfo(res.data[0]); alert('✅ พบครุภัณฑ์: ' + res.data[0].equipment_code); }
      else { showEquipmentList(res.data); }
      return;
    }
    if (box) { box.innerHTML = `<div class="alert alert-error">❌ ไม่พบครุภัณฑ์ "${code}" ในระบบ</div>`; box.style.display = 'block'; }
    alert('❌ ไม่พบครุภัณฑ์ที่ค้นหา');
    window.currentEquipId = null;
  } catch (error) { console.error(error); if(box) box.innerHTML = '<div class="alert alert-error">❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้</div>'; }
  finally { if(searchBtn) { searchBtn.textContent = '🔍 ค้นหา'; searchBtn.disabled = false; } }
}

function displayEquipmentInfo(e) {
  const box = document.getElementById('equip-info-box');
  if (!box) return;
  window.currentEquipId = e.id;
  box.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;"><div><div style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">📦 ข้อมูลครุภัณฑ์ที่พบ</div><div style="font-size:16px;font-weight:600;color:var(--text);">${e.equipment_name}</div><div style="font-size:13px;color:var(--text-muted);margin-top:4px;">รหัส: <strong style="color:var(--accent);font-family:'Courier New',monospace;">${e.equipment_code}</strong> | ประเภท: ${e.type_name}</div><div style="font-size:13px;color:var(--text-muted);margin-top:4px;">📍 ${e.location_building || '-'} / ${e.location_department || '-'} / ห้อง ${e.location_room || '-'}</div></div><div><span class="badge success" style="background:#dcfce7;color:#166534;padding:6px 14px;border-radius:20px;font-size:12px;">✅ พบแล้ว</span></div></div>`;
  box.style.display = 'block'; box.style.border = '2px solid #22c55e'; box.style.background = '#f0fdf4';
  if (document.getElementById('rf-building')) document.getElementById('rf-building').value = e.location_building || '';
  if (document.getElementById('rf-dept')) document.getElementById('rf-dept').value = e.location_department || '';
  if (document.getElementById('rf-room')) document.getElementById('rf-room').value = e.location_room || '';
  const typeSelect = document.getElementById('rf-type'); if (typeSelect) typeSelect.value = e.equipment_type_id;
  const partsSection = document.getElementById('parts-section'); const partsGrid = document.getElementById('parts-grid');
  if (e.has_parts && e.parts && partsSection && partsGrid) {
    partsSection.style.display = 'block';
    partsGrid.innerHTML = e.parts.map(p => `<label class="part-check"><input type="checkbox" name="part" value="${p.part_name}"> ${p.part_name}</label>`).join('');
  }
}

function showEquipmentList(equipmentList) {
  const box = document.getElementById('equip-info-box'); if (!box) return;
  let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">🔍 พบ ${equipmentList.length} รายการ กรุณาเลือก:</div><div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">`;
  equipmentList.forEach(e => { html += `<div class="equip-search-item" onclick="selectEquipment(${e.id})" style="padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card);"><div><strong style="color:var(--text);">${e.equipment_name}</strong><span style="font-size:12px;color:var(--text-muted);margin-left:8px;font-family:'Courier New',monospace;">${e.equipment_code}</span><div style="font-size:12px;color:var(--text-muted);">${e.type_name} | ${e.location_building || '-'} / ${e.location_department || '-'}</div></div><span style="font-size:20px;color:var(--accent);">→</span></div>`; });
  html += `</div>`;
  box.innerHTML = html; box.style.display = 'block'; box.style.border = '2px solid var(--accent)'; box.style.background = '#fef9f5';
}

async function selectEquipment(id) {
  try { const res = await api('GET', `/api/equipment/${id}`); if (res.success) { displayEquipmentInfo(res.data); document.getElementById('rf-equip-code').value = res.data.equipment_code; alert('✅ เลือกครุภัณฑ์: ' + res.data.equipment_name); } }
  catch (error) { console.error(error); alert('❌ เกิดข้อผิดพลาด'); }
}

async function submitRepairForm() {
  const eqId = window.currentEquipId;
  const desc = document.getElementById('rf-problem').value.trim();
  const name = document.getElementById('rf-requester').value.trim();
  const priority = document.getElementById('rf-priority').value;
  const alertEl = document.getElementById('repair-alert');
  if (!eqId || !desc || !name) { alertEl.innerHTML = '<div class="alert alert-error">⚠️ กรุณากรอกข้อมูลให้ครบ</div>'; return; }
  const parts = Array.from(document.querySelectorAll('input[name="part"]:checked')).map(c => c.value);
  const formData = new FormData();
  formData.append('equipment_id', eqId); formData.append('problem_description', desc); formData.append('requester_name', name);
  formData.append('equipment_parts', parts.join(',')); formData.append('priority', priority);
  formData.append('location_building', document.getElementById('rf-building')?.value || '');
  formData.append('location_department', document.getElementById('rf-dept')?.value || '');
  formData.append('location_room', document.getElementById('rf-room')?.value || '');
  const imageFile = document.getElementById('rf-image')?.files?.[0]; if (imageFile) formData.append('image', imageFile);
  try {
    const res = await apiForm('POST', '/api/repairs', formData);
    if (res.success) { alertEl.innerHTML = `<div class="alert alert-success">✅ บันทึกคำแจ้งซ่อมสำเร็จ เลขที่: ${res.ticket_number}</div>`; resetRepairForm(); }
    else { alertEl.innerHTML = `<div class="alert alert-error">❌ ${res.message}</div>`; }
  } catch { alertEl.innerHTML = '<div class="alert alert-error">❌ เกิดข้อผิดพลาด</div>'; }
}

function resetRepairForm() {
  document.getElementById('rf-equip-code').value = ''; document.getElementById('rf-problem').value = '';
  document.getElementById('rf-requester').value = ''; document.getElementById('rf-image').value = '';
  document.getElementById('rf-building').value = ''; document.getElementById('rf-dept').value = ''; document.getElementById('rf-room').value = '';
  document.getElementById('rf-priority').value = 'normal';
  document.getElementById('equip-info-box').style.display = 'none'; document.getElementById('parts-section').style.display = 'none';
  window.currentEquipId = null;
}

function onTypeChange() {}

// ===== Smart Back Navigation =====
function hasFormData() {
  return !!(document.getElementById('rf-equip-code')?.value.trim()
    || document.getElementById('rf-problem')?.value.trim()
    || document.getElementById('rf-requester')?.value.trim()
    || document.getElementById('rf-building')?.value.trim()
    || document.getElementById('rf-dept')?.value.trim()
    || document.getElementById('rf-room')?.value.trim());
}

function goBackFromRepair() {
  if (hasFormData()) {
    if (!confirm('⚠️ คุณมีข้อมูลที่กรอกไว้ ต้องการออกจากหน้านี้ใช่หรือไม่?\n\nข้อมูลที่กรอกไว้จะหายไป')) {
      return;
    }
  }

  var ref = document.referrer || '';
  if (ref.includes('type-user.html') || ref.includes('type-select.html')) {
    window.location.href = '../type-select.html';
    return;
  }
  if (ref.includes('my-history.html')) {
    window.location.href = ref.includes('/user/') ? 'my-history.html' : '../my-history.html';
    return;
  }
  if (ref.includes('equipment.html')) {
    var match = ref.match(/[?&]type_id=(\d+)/);
    window.location.href = '../equipment.html' + (match ? '?type_id=' + match[1] : '');
    return;
  }
  if (ref.includes('home.html')) {
    window.location.href = '../home.html';
    return;
  }

  if (document.referrer && document.referrer !== window.location.href) {
    window.history.back();
  } else {
    window.location.href = '../home.html';
  }
}
// 🔄 Auto-fill ครุภัณฑ์จาก query param (มาจากหน้า user/equipment.html)
(async function autoFillFromQuery() {
  const params = new URLSearchParams(window.location.search);
  const equipId = params.get('equip_id');
  if (equipId) {
    try {
      const res = await api('GET', `/api/equipment/${equipId}`);
      if (res.success) {
        displayEquipmentInfo(res.data);
        document.getElementById('rf-equip-code').value = res.data.equipment_code;
        if (document.getElementById('rf-type')) document.getElementById('rf-type').value = res.data.equipment_type_id;
      }
    } catch(e) { console.error('Auto-fill equipment failed:', e); }
  }
})();

// Auto-fill ชื่อผู้แจ้งจากข้อมูลผู้ใช้ที่ล็อกอิน
(function() {
  const user = JSON.parse(localStorage.getItem('repair_user') || 'null');
  if (user) {
    const requesterInput = document.getElementById('rf-requester');
    if (requesterInput) {
      requesterInput.value = user.full_name || user.username || '';
    }
  }
})();
</script>

<script src="/socket.io/socket.io.js"></script>
<script src="/socket-client.js"></script>
</body>
