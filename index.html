<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ - ระบบแจ้งซ่อมครุภัณฑ์</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dark Mode Toggle -->
  <div style="position:fixed;top:16px;right:20px;z-index:100;">
    <button class="theme-toggle" onclick="toggleDarkMode()" id="theme-toggle" style="background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;">🌙</button>
  </div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🔧</div>
        <div>
          <h1>ระบบแจ้งซ่อม</h1>
          <p>Repair Management System</p>
        </div>
      </div>
      <h2>เข้าสู่ระบบ</h2>
      <p>สำหรับผู้ดูแลระบบ</p>
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="login-username" placeholder="กรอกชื่อผู้ใช้">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="login-password" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="msg-error" id="login-err"></div>
      <button class="btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
