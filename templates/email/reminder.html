<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แจ้งเตือนครุภัณฑ์ใกล้หมดอายุ</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;font-family:'Sarabun','Tahoma',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4f8;padding:30px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg, #f59e0b, #d97706);padding:28px 32px;text-align:center;">
              <h1 style="color:#ffffff;font-size:24px;margin:0;font-weight:600;">⚠️ เตือนครุภัณฑ์ใกล้หมดอายุ</h1>
              <p style="color:rgba(255,255,255,0.85);font-size:14px;margin:8px 0 0;">กรุณาตรวจสอบและดำเนินการ</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="font-size:16px;color:#333;margin:0 0 8px;">เรียน <strong>ผู้ดูแลระบบ</strong></p>
              <p style="font-size:14px;color:#555;margin:0 0 24px;line-height:1.6;">
                มีครุภัณฑ์ที่กำลังจะหมดอายุประกัน/อายุการใช้งาน รายละเอียดดังนี้:
              </p>

              <!-- Equipment List -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                      <tr style="background:#fef3c7;">
                        <td style="font-size:12px;color:#92400e;padding:6px 8px;font-weight:600;">รหัส</td>
                        <td style="font-size:12px;color:#92400e;padding:6px 8px;font-weight:600;">ชื่อครุภัณฑ์</td>
                        <td style="font-size:12px;color:#92400e;padding:6px 8px;font-weight:600;">วันหมดอายุ</td>
                        <td style="font-size:12px;color:#92400e;padding:6px 8px;font-weight:600;">คงเหลือ</td>
                      </tr>
                      {{reminder_rows}}
                    </table>
                  </td>
                </tr>
              </table>

              <!-- CTA Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td align="center">
                    <a href="{{system_url}}/admin/equipment.html" style="display:inline-block;background-color:#f59e0b;color:#ffffff;text-decoration:none;padding:12px 32px;border-radius:6px;font-size:14px;font-weight:600;">จัดการครุภัณฑ์</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;padding:20px 32px;text-align:center;border-top:1px solid #e2e8f0;">
              <p style="font-size:12px;color:#94a3b8;margin:0;">
                อีเมลนี้ส่งจากระบบอัตโนมัติ กรุณาอย่าตอบกลับ<br>
                © {{year}} ระบบแจ้งซ่อมครุภัณฑ์
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
