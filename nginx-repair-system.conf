# =============================================
# Nginx Reverse Proxy Configuration
# สำหรับระบบเว็บแจ้งซ่อม
# =============================================
# วิธีใช้ (Ubuntu/Debian):
#   1. cp nginx-repair-system.conf /etc/nginx/sites-available/repair-system
#   2. sudo ln -s /etc/nginx/sites-available/repair-system /etc/nginx/sites-enabled/
#   3. sudo nginx -t   (ทดสอบ config)
#   4. sudo systemctl reload nginx
#
# วิธีใช้ (อื่นๆ):
#   วางไฟล์นี้ใน /etc/nginx/conf.d/repair-system.conf
#
# สำหรับ HTTPS (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#   Certbot จะแก้ config ให้เอง — ไม่ต้องแก้ด้วยมือ
# =============================================

# === HTTP → Redirect to HTTPS (comment ถ้ายังไม่มี SSL) ===
server {
    listen 80;
    server_name your-domain.com;   # ← เปลี่ยนเป็น domain จริง

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

